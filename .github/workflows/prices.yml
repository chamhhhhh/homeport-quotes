# 此文件在 GitHub 仓库中的路径必须是：.github/workflows/prices.yml
# 作用：每个交易日自动抓行情写入 prices.json——北京 15:10 抓收盘价；北京 23:10 再跑一次，补当天场外基金/债基净值（净值要晚间才公布）

name: fetch-prices

on:
  schedule:
    - cron: "10 7 * * 1-5"    # UTC 07:10 = 北京 15:10，周一到周五：收盘价
    - cron: "10 15 * * 1-5"   # UTC 15:10 = 北京 23:10，周一到周五：补当天基金净值
  workflow_dispatch: {}       # 也可以手动点按钮触发

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node fetch-prices.mjs
      - run: |
          git config user.name "prices-bot"
          git config user.email "actions@users.noreply.github.com"
          git add prices.json history.json
          git commit -m "prices $(date -u +%F)" || echo "no change"
          git push
