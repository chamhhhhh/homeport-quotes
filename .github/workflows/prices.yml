# 此文件在 GitHub 仓库中的路径必须是：.github/workflows/prices.yml
# 作用：每个交易日北京时间 15:10 自动抓收盘价，写入仓库根目录 prices.json

name: fetch-prices

on:
  schedule:
    - cron: "10 7 * * 1-5"   # UTC 07:10 = 北京 15:10，周一到周五
  workflow_dispatch: {}       # 也可以手动点按钮触发

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node fetch-prices.mjs
      - run: |
          git config user.name "prices-bot"
          git config user.email "actions@users.noreply.github.com"
          git add prices.json history.json
          git commit -m "prices $(date -u +%F)" || echo "no change"
          git push
